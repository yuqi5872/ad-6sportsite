<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title></title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    min-height: 100%;
    background: radial-gradient(circle at 50% 30%, #1c1f2b 0%, #0a0b10 70%);
    overflow: hidden;
  }
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  /* 手機外框 */
  .phone {
    position: relative;
    width: min(86vw, calc(88vh * 9 / 16), 460px);
    height: auto;
    aspect-ratio: 9 / 16;
    background: #0d0d10;
    border-radius: 46px;
    padding: 12px;
    box-shadow:
      0 0 0 2px #2a2c36,
      0 30px 70px rgba(0,0,0,.65),
      0 8px 24px rgba(0,0,0,.5);
  }
  /* 螢幕 */
  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 36px;
    overflow: hidden;
    background: #000;
  }
  .screen video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  /* 動態島 */
  .island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 34%;
    height: 26px;
    background: #000;
    border-radius: 16px;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="phone">
      <div class="screen">
        <div class="island"></div>
        <video id="v" src="video.mp4" autoplay loop playsinline webkit-playsinline></video>
      </div>
    </div>
  </div>
  <script>
    // 預設開聲音；若瀏覽器擋下有聲自動播放，使用者一碰畫面立刻補上聲音
    var v = document.getElementById('v');
    v.muted = false;
    v.volume = 1;
    function ensureSound() {
      v.muted = false;
      v.volume = 1;
      v.play().catch(function(){});
    }
    v.play().catch(function () {
      // 被擋下：先靜音播放，等互動再開聲
      v.muted = true;
      v.play().catch(function(){});
    });
    ['click', 'touchstart', 'keydown'].forEach(function (e) {
      document.addEventListener(e, ensureSound, { once: false });
    });
  </script>
</body>
</html>
